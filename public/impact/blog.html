<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Table Puskesmas</title>
  <script src="https://cdn.tailwindcss.com"></script>
</head>

<body class="bg-gray-50 p-10 flex justify-center">
  <table class="table-auto border-collapse border border-gray-500 w-full max-w-md text-center text-sm">
    <thead>
      <tr>
        <th class="border border-gray-500 px-3 py-2 bg-gray-300">No</th>
        <th class="border border-gray-500 px-3 py-2 bg-gray-300">Puskesmas</th>
      </tr>
    </thead>
    <tbody>
      <!-- Row 1 -->
      <tr>
        <td class="border border-gray-500 px-3 py-2 align-top" rowspan="5">1</td>
        <td class="border border-gray-500 px-3 py-2 font-semibold">Kecamatan Simpati</td>
      </tr>
      <tr>
        <td class="border border-gray-500 px-3 py-2 font-bold uppercase">UPT PUSKESMAS SIMPATI</td>
      </tr>
      <tr>
        <td class="border border-gray-500 px-3 py-2">Nomor 1</td>
      </tr>
      <tr>
        <td class="border border-gray-500 px-3 py-2">Nomor 2</td>
      </tr>
      <tr>
        <td class="border border-gray-500 px-3 py-2 bg-white"></td>
      </tr>

      <!-- Row 2 -->
      <tr>
        <td class="border border-gray-500 px-3 py-2 align-top" rowspan="5">2</td>
        <td class="border border-gray-500 px-3 py-2 font-semibold">Kecamatan Bonjol</td>
      </tr>
      <tr>
        <td class="border border-gray-500 px-3 py-2 font-bold uppercase">UPT PUSKESMAS TAPUS</td>
      </tr>
      <tr>
        <td class="border border-gray-500 px-3 py-2">Nomor 1</td>
      </tr>
      <tr>
        <td class="border border-gray-500 px-3 py-2">Nomor 2</td>
      </tr>
      <tr>
        <td class="border border-gray-500 px-3 py-2 bg-white"></td>
      </tr>

      <!-- Row 3 -->
      <tr>
        <td class="border border-gray-500 px-3 py-2 align-top" rowspan="5">3</td>
        <td class="border border-gray-500 px-3 py-2 font-semibold">Kecamatan Lubuk Sikaping</td>
      </tr>
      <tr>
        <td class="border border-gray-500 px-3 py-2 font-bold uppercase">UPT PUSKESMAS LUBUK SIKAPING</td>
      </tr>
      <tr>
        <td class="border border-gray-500 px-3 py-2">Nomor 3</td>
      </tr>
      <tr>
        <td class="border border-gray-500 px-3 py-2">Nomor 4</td>
      </tr>
      <tr>
        <td class="border border-gray-500 px-3 py-2 bg-white"></td>
      </tr>

      <!-- Row 4 -->
      <tr>
        <td class="border border-gray-500 px-3 py-2 align-top" rowspan="5">4</td>
        <td class="border border-gray-500 px-3 py-2 font-semibold">Kecamatan Tigo Nagari</td>
      </tr>
      <tr>
        <td class="border border-gray-500 px-3 py-2 font-bold uppercase">UPT PUSKESMAS LADANG PANJANG</td>
      </tr>
      <tr>
        <td class="border border-gray-500 px-3 py-2">Nomor 5</td>
      </tr>
      <tr>
        <td class="border border-gray-500 px-3 py-2">Nomor 6</td>
      </tr>
      <tr>
        <td class="border border-gray-500 px-3 py-2 bg-white"></td>
      </tr>
    </tbody>
  </table>
</body>

</html>
